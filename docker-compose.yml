version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: colegio_postgres
    environment:
      POSTGRES_DB: colegio_gestion
      POSTGRES_USER: colegio
      POSTGRES_PASSWORD: colegio123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U colegio -d colegio_gestion']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./app/backend
    container_name: colegio_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/colegio_gestion
      SPRING_DATASOURCE_USERNAME: colegio
      SPRING_DATASOURCE_PASSWORD: colegio123
      APP_CORS_ALLOWED_ORIGIN: http://localhost:3000
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./app/frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    container_name: colegio_frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres_data:
