spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/colegio_gestion}
    username: ${SPRING_DATASOURCE_USERNAME:colegio}
    password: ${SPRING_DATASOURCE_PASSWORD:colegio123}
